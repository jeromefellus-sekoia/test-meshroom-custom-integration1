description: Integrates with JIRA
name: atlassian_jira
settings:
- description: Your organization JIRA domain (e.g. 'sandbox.atlassian.net')
  name: domain
  required: true
- description: Email of the user
  name: email
  required: true
- description: API Key to use to connect to JIRA API endpoints
  name: api_key
  required: true
